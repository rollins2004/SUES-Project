{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — VoteX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --neon-blue: #00d4ff; --neon-violet: #bf5fff;
      --neon-green: #00ff88; --neon-red: #ff3366;
      --bg-dark: #030712; --text-primary: #e2f0ff; --text-muted: #6b8ab0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-dark); color: var(--text-primary);
      font-family: 'Rajdhani', sans-serif; min-height: 100vh;
      display: flex; flex-direction: column;
      background-image:
        radial-gradient(ellipse 60% 50% at 0% 50%, rgba(0,212,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 100% 50%, rgba(191,95,255,0.06) 0%, transparent 60%),
        linear-gradient(rgba(0,212,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.02) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 50px 50px, 50px 50px;
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(3,7,18,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,212,255,0.15);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem; height: 70px;
    }
    .nav-brand {
      font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.3rem;
      color: var(--neon-blue); letter-spacing: 3px; text-decoration: none;
      text-shadow: 0 0 25px rgba(0,212,255,0.7);
      display: flex; align-items: center; gap: 10px;
    }
    .nav-brand-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-violet));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 15px rgba(0,212,255,0.5);
    }
    .nav-reg { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); text-decoration: none; border: 1px solid rgba(0,212,255,0.3); padding: 0.5rem 1.2rem; border-radius: 7px; transition: all 0.3s; }
    .nav-reg:hover { color: var(--neon-blue); background: rgba(0,212,255,0.08); }

    .page-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 7rem 1.5rem 3rem;
    }
    .login-container { width: 100%; max-width: 460px; }

    .login-header { text-align: center; margin-bottom: 2.5rem; }
    .login-icon {
      width: 80px; height: 80px; border-radius: 20px; margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(191,95,255,0.15));
      border: 1px solid rgba(0,212,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: var(--neon-blue);
      box-shadow: 0 0 40px rgba(0,212,255,0.15);
      animation: pulse-icon 2s ease infinite;
    }
    @keyframes pulse-icon {
      0%,100% { box-shadow: 0 0 20px rgba(0,212,255,0.2); }
      50% { box-shadow: 0 0 50px rgba(0,212,255,0.5); }
    }
    .login-title {
      font-family: 'Orbitron', sans-serif; font-size: 1.6rem; font-weight: 900;
      letter-spacing: 2px; color: var(--neon-blue);
      text-shadow: 0 0 20px rgba(0,212,255,0.5);
    }
    .login-subtitle { font-size: 0.9rem; color: var(--text-muted); margin-top: 0.5rem; letter-spacing: 1px; }

    .login-card {
      background: rgba(10,20,40,0.85);
      border: 1px solid rgba(0,212,255,0.18);
      border-radius: 20px; padding: 2.5rem;
      backdrop-filter: blur(25px);
      box-shadow: 0 25px 80px rgba(0,0,0,0.5), 0 0 60px rgba(0,212,255,0.05);
      position: relative; overflow: hidden;
    }
    .login-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-violet), transparent);
    }

    .form-group { margin-bottom: 1.5rem; }
    .form-label {
      font-family: 'Rajdhani', sans-serif; font-size: 0.75rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 0.5rem; display: flex; align-items: center; gap: 6px;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 0.9rem; pointer-events: none;
      transition: color 0.3s;
    }
    .form-input {
      width: 100%; background: rgba(0,212,255,0.04);
      border: 1px solid rgba(0,212,255,0.18); border-radius: 10px;
      color: var(--text-primary); font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem; padding: 0.85rem 1rem 0.85rem 2.75rem;
      transition: all 0.3s; outline: none;
    }
    .form-input:focus {
      border-color: var(--neon-blue);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.12), inset 0 0 20px rgba(0,212,255,0.03);
      background: rgba(0,212,255,0.07);
    }
    .form-input:focus + .input-icon { color: var(--neon-blue); }
    .form-input::placeholder { color: rgba(107,138,176,0.6); }

    .toggle-pw {
      position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); background: none; border: none; cursor: pointer;
      font-size: 0.9rem; transition: color 0.3s; padding: 0;
    }
    .toggle-pw:hover { color: var(--neon-blue); }

    .btn-login {
      width: 100%; padding: 1rem; border-radius: 10px; border: none; cursor: pointer;
      font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      background: linear-gradient(135deg, #0055bb, var(--neon-blue));
      color: #000; margin-top: 0.5rem;
      box-shadow: 0 0 30px rgba(0,212,255,0.4), 0 4px 15px rgba(0,0,0,0.3);
      transition: all 0.3s; position: relative; overflow: hidden;
    }
    .btn-login::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 0 50px rgba(0,212,255,0.6); }
    .btn-login:hover::before { opacity: 1; }
    .btn-login:active { transform: translateY(0); }

    .divider { text-align: center; margin: 1.5rem 0; color: var(--text-muted); font-size: 0.8rem; letter-spacing: 2px; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 35%; height: 1px; background: rgba(0,212,255,0.15); }
    .divider::before { left: 0; } .divider::after { right: 0; }

    .register-link {
      text-align: center; font-size: 0.9rem; color: var(--text-muted);
    }
    .register-link a { color: var(--neon-blue); text-decoration: none; font-weight: 700; transition: all 0.3s; }
    .register-link a:hover { text-shadow: 0 0 15px rgba(0,212,255,0.6); }

    .cyber-alert {
      border-radius: 10px; padding: 0.85rem 1rem;
      margin-bottom: 1.25rem; font-size: 0.88rem; font-weight: 500;
      display: flex; align-items: center; gap: 8px; border: 1px solid;
    }
    .alert-error { background: rgba(255,51,102,0.08); border-color: rgba(255,51,102,0.3); color: var(--neon-red); }
    .alert-success { background: rgba(0,255,136,0.08); border-color: rgba(0,255,136,0.3); color: var(--neon-green); }
    .alert-info { background: rgba(0,212,255,0.08); border-color: rgba(0,212,255,0.3); color: var(--neon-blue); }

    footer { text-align: center; padding: 1.5rem; font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--text-muted); letter-spacing: 2px; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-brand">
    <div class="nav-brand-icon"><i class="fas fa-vote-yea"></i></div>
    VOTEX
  </a>
  <a href="{% url 'register' %}" class="nav-reg"><i class="fas fa-user-plus"></i> Register</a>
</nav>

<div class="page-wrap">
  <div class="login-container">
    <div class="login-header">
      <div class="login-icon"><i class="fas fa-fingerprint"></i></div>
      <div class="login-title">SECURE LOGIN</div>
      <div class="login-subtitle">Enter your credentials to access the election portal</div>
    </div>

    <div class="login-card">
      {% if messages %}
        {% for message in messages %}
          <div class="cyber-alert {% if message.tags == 'error' %}alert-error{% elif message.tags == 'success' %}alert-success{% else %}alert-info{% endif %}">
            <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle{% elif message.tags == 'success' %}fa-check-circle{% else %}fa-info-circle{% endif %}"></i>
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <form method="post" autocomplete="off">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label"><i class="fas fa-id-badge"></i> Registration Number</label>
          <div class="input-wrap">
            <input type="text" name="registration_number" class="form-input" placeholder="e.g. U18UZ22S0001" required autocomplete="off">
            <i class="fas fa-id-card input-icon" style="pointer-events:none;position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-muted);"></i>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-lock"></i> Password</label>
          <div class="input-wrap" style="position:relative;">
            <input type="password" name="password" id="pw" class="form-input" placeholder="Enter your password" required>
            <i class="fas fa-lock input-icon" style="pointer-events:none;position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-muted);"></i>
            <button type="button" class="toggle-pw" onclick="togglePw()"><i class="fas fa-eye" id="eye-icon"></i></button>
          </div>
        </div>
        <button type="submit" class="btn-login">
          <i class="fas fa-sign-in-alt"></i> &nbsp; ACCESS PORTAL
        </button>
      </form>

      <div class="divider">OR</div>
      <div class="register-link">
        New student? <a href="{% url 'register' %}">Create Account →</a>
      </div>
    </div>
  </div>
</div>

<footer>⚡ VOTEX — SECURE ELECTION SYSTEM © 2026</footer>

<script>
  function togglePw() {
    const pw = document.getElementById('pw');
    const icon = document.getElementById('eye-icon');
    if (pw.type === 'password') { pw.type = 'text'; icon.className = 'fas fa-eye-slash'; }
    else { pw.type = 'password'; icon.className = 'fas fa-eye'; }
  }
</script>
</body>
</html>
